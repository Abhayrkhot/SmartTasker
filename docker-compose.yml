services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smarttasker}
      POSTGRES_USER: ${POSTGRES_USER:-smarttasker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smarttasker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smarttasker} -d ${POSTGRES_DB:-smarttasker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      # Django reads DB_* first; fall back to POSTGRES_* from .env for a single source of truth
      DB_NAME: ${DB_NAME:-${POSTGRES_DB:-smarttasker}}
      DB_USER: ${DB_USER:-${POSTGRES_USER:-smarttasker}}
      DB_PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD:-smarttasker}}
      DB_HOST: db
      DB_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-smarttasker}
      POSTGRES_USER: ${POSTGRES_USER:-smarttasker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smarttasker}
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
